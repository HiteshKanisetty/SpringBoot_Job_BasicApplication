<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Portal - Home</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            color: white;
            font-size: 40px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 15px;
            font-size: 18px;
            color: white;
            background-color: #333;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #555;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Welcome to Job Portal</h1>

    < <p class="role">
    Logged in as: <span th:text="${session.loggedUser.username}"></span> |
    Role: <span th:text="${session.role}"></span>
</p>

    <!-- ➕ ADMIN ONLY -->
    <div th:if="${session.role == 'ADMIN'}">
        <a th:href="@{/addJob}" class="btn">Add Job</a>
    </div>

    <!-- 👁️ Everyone -->
    <a th:href="@{/viewJobs}" class="btn">View Jobs</a>

    <!-- 🚪 Logout -->
    <a th:href="@{/logout}" class="btn logout">Logout</a>
</div>

</body>
</html>
